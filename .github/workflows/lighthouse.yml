name: Lighthouse CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Serve static site
        run: |
          npx --yes http-server . -p 8080 -s &
          sleep 2

      - name: Run Lighthouse CI
        run: |
          npm install -g @lhci/cli@0.13.x
          lhci autorun \
            --collect.url=http://localhost:8080/index.html \
            --collect.url=http://localhost:8080/preview.html \
            --collect.url=http://localhost:8080/impressum.html \
            --collect.url=http://localhost:8080/datenschutz.html \
            --collect.numberOfRuns=1 \
            --upload.target=temporary-public-storage \
            --assert.assertions.categories:performance=warn \
            --assert.assertions.categories:accessibility=error \
            --assert.assertions.categories:best-practices=warn \
            --assert.assertions.categories:seo=warn || true
