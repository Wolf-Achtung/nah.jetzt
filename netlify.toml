# Statisches Investor-Relations-Site (kein Build-Step, siehe CLAUDE.md).
# Dieser Block ergänzt nur Security-Header - Netlify liefert die Dateien
# direkt aus dem Repo-Root aus.

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'none'; script-src 'self' 'unsafe-inline' https://stats.nah.jetzt; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://api.qrserver.com; connect-src 'self' https://stats.nah.jetzt; frame-src https://app.nah.jetzt; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
